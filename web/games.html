<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Games Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f6f1eb; --surface: #ffffff; --border: #e4ddd4;
      --text: #1c1917; --text-2: #57534e; --text-3: #a8a29e;
      --primary: #7c3aed; --primary-bg: #f5f3ff;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,.10), 0 1px 3px rgba(0,0,0,.06);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.14), 0 4px 12px rgba(0,0,0,.08);
      --transition: 0.18s ease;
      --green: #16a34a; --green-bg: #dcfce7;
      --amber: #b45309; --amber-bg: #fef3c7;
      --red: #dc2626; --red-bg: #fee2e2;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }

    /* ── HEADER ── */
    .app-header { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); height: 68px; display: flex; align-items: center; gap: 12px; padding: 0 24px; box-shadow: var(--shadow); }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .brand-icon { font-size: 1.6rem; line-height: 1; }
    .brand-title { font-size: 1.15rem; font-weight: 700; color: var(--primary); letter-spacing: -.02em; }
    .header-date { margin-left: auto; font-size: 13px; color: var(--text-3); font-weight: 500; }

    /* ── CONTENT ── */
    .content { padding: 28px 24px 60px; max-width: 960px; margin: 0 auto; }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); margin-bottom: 16px; }

    /* ── GAME CARDS GRID ── */
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; }

    /* ── GAME CARD ── */
    .game-card { background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
    .card-header { display: flex; align-items: center; gap: 14px; padding: 18px 20px 16px; border-bottom: 1px solid var(--border); background: var(--primary-bg); }
    .card-icon { font-size: 2rem; line-height: 1; flex-shrink: 0; }
    .card-name { font-size: 1.05rem; font-weight: 800; letter-spacing: -.02em; color: var(--primary); }
    .card-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

    /* ── TRACK SECTION ── */
    .track { display: flex; align-items: center; gap: 12px; }
    .track-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-3); width: 56px; flex-shrink: 0; }
    .track-info { flex: 1; }
    .track-stat { font-size: 1.1rem; font-weight: 700; color: var(--text); line-height: 1.2; }
    .track-sub { font-size: 12px; color: var(--text-3); margin-top: 1px; }
    .track-actions { display: flex; gap: 6px; align-items: center; }

    /* status badges */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-amber { background: var(--amber-bg); color: var(--amber); }
    .badge-red { background: var(--red-bg); color: var(--red); }

    /* buttons */
    .btn { display: inline-flex; align-items: center; gap: 5px; height: 34px; padding: 0 13px; border: 1.5px solid var(--border); border-radius: 9px; background: var(--surface); color: var(--text-2); font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition); white-space: nowrap; font-family: inherit; }
    .btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-bg); }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-primary:hover { background: #6d28d9; border-color: #6d28d9; color: #fff; }
    .btn-primary:disabled { opacity: .45; cursor: default; }
    .btn-primary:disabled:hover { background: var(--primary); border-color: var(--primary); }
    .btn-sm { height: 30px; padding: 0 10px; font-size: 12px; border-radius: 7px; }
    .btn-icon { width: 30px; height: 30px; padding: 0; justify-content: center; font-size: 14px; border-radius: 7px; }

    /* inline number input */
    .num-input-wrap { display: flex; align-items: center; gap: 4px; }
    .num-input { width: 70px; height: 30px; padding: 0 8px; border: 1.5px solid var(--border); border-radius: 7px; font-size: 13px; font-weight: 600; font-family: inherit; color: var(--text); background: var(--bg); text-align: center; outline: none; transition: border-color var(--transition); }
    .num-input:focus { border-color: var(--primary); background: #fff; }

    /* divider */
    .track-divider { height: 1px; background: var(--border); margin: 2px 0; }

    /* ── LOG SECTION ── */
    .card-log { padding: 0 20px 16px; }
    .log-toggle { font-size: 12px; color: var(--text-3); cursor: pointer; display: flex; align-items: center; gap: 4px; width: fit-content; transition: color var(--transition); }
    .log-toggle:hover { color: var(--primary); }
    .log-list { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; max-height: 140px; overflow-y: auto; }
    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .log-entry { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-2); }
    .log-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .log-dot-daily { background: var(--primary); }
    .log-dot-backlog { background: #06b6d4; }
    .log-date { color: var(--text-3); min-width: 80px; }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(28,25,23,.55); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 100%; max-width: 380px; animation: modal-in .2s ease; overflow: hidden; }
    @keyframes modal-in { from { opacity: 0; transform: translateY(12px) scale(.98); } to { opacity: 1; transform: none; } }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
    .modal-head h3 { font-size: 1rem; font-weight: 700; }
    .modal-close { width: 30px; height: 30px; border: 1.5px solid var(--border); border-radius: 7px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-2); font-size: 14px; transition: all var(--transition); }
    .modal-close:hover { background: var(--red-bg); border-color: #fca5a5; color: var(--red); }
    .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
    .modal-field { display: flex; flex-direction: column; gap: 5px; }
    .modal-field label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); }
    .modal-field input { padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg); outline: none; transition: border-color var(--transition); }
    .modal-field input:focus { border-color: var(--primary); background: #fff; }
    .modal-hint { font-size: 12px; color: var(--text-3); }
    .modal-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); background: var(--bg); }

    /* ── SUMMARY BAR ── */
    .summary-bar { display: flex; gap: 20px; margin-bottom: 28px; padding: 16px 20px; background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: var(--shadow); flex-wrap: wrap; }
    .summary-item { display: flex; flex-direction: column; gap: 2px; }
    .summary-val { font-size: 1.4rem; font-weight: 800; color: var(--primary); line-height: 1; }
    .summary-lbl { font-size: 11px; color: var(--text-3); font-weight: 500; }
    .summary-divider { width: 1px; background: var(--border); }

    @media (max-width: 520px) {
      .games-grid { grid-template-columns: 1fr; }
      .content { padding: 16px 16px 40px; }
      .summary-bar { gap: 14px; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <a class="brand" href="#">
    <span class="brand-icon">🎮</span>
    <span class="brand-title">Mini Games Tracker</span>
  </a>
  <span class="header-date" id="header-date"></span>
</header>

<div class="content">
  <div class="summary-bar" id="summary-bar"></div>
  <div class="section-title">Games</div>
  <div class="games-grid" id="games-grid"></div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modal-title">Edit</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-field" id="modal-daily-field">
        <label>Last daily date</label>
        <input type="date" id="modal-daily-date" />
        <span class="modal-hint">Leave blank to clear.</span>
      </div>
      <div class="modal-field">
        <label>Current backlog number</label>
        <input type="number" id="modal-backlog-num" min="0" step="1" placeholder="e.g. 47" />
        <span class="modal-hint">The last backlog episode/puzzle you completed.</span>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const GAMES = [
  { id: 'faces',   name: 'Faces',            icon: '👤' },
  { id: 'episode', name: 'Guess the Episode', icon: '📺' },
  { id: 'gaps',    name: 'Gaps',              icon: '🔡' },
  { id: 'acrostic',name: 'Acrostic',          icon: '📝' },
];

// ── Storage ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'mini-games-tracker-v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  const defaults = {};
  GAMES.forEach(g => {
    defaults[g.id] = { lastDailyDate: null, backlogNumber: 0, log: [] };
  });
  return defaults;
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10); // YYYY-MM-DD
}

function formatDate(str) {
  if (!str) return null;
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const last = new Date(dateStr + 'T00:00:00');
  const today = new Date(todayStr() + 'T00:00:00');
  return Math.round((today - last) / 86400000);
}

function dailyBadge(days) {
  if (days === null) return { cls: 'badge-red', text: 'Never played' };
  if (days === 0)    return { cls: 'badge-green', text: 'Done today!' };
  if (days === 1)    return { cls: 'badge-amber', text: '1 day ago' };
  return { cls: 'badge-red', text: `${days} days ago` };
}

// ── Render ───────────────────────────────────────────────────────────────────
let data = loadData();
let logOpenMap = {};

function renderSummary() {
  const today = todayStr();
  const playedToday = GAMES.filter(g => data[g.id].lastDailyDate === today).length;
  const totalBacklog = GAMES.reduce((acc, g) => acc + (data[g.id].backlogNumber || 0), 0);
  const neverPlayed = GAMES.filter(g => !data[g.id].lastDailyDate).length;

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-item">
      <div class="summary-val">${playedToday}/${GAMES.length}</div>
      <div class="summary-lbl">Done today</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <div class="summary-val">${GAMES.length - playedToday}</div>
      <div class="summary-lbl">Still to do today</div>
    </div>
    <div class="summary-divider"></div>
    <div class="summary-item">
      <div class="summary-val">${totalBacklog}</div>
      <div class="summary-lbl">Total backlog reached</div>
    </div>
    ${neverPlayed > 0 ? `<div class="summary-divider"></div>
    <div class="summary-item">
      <div class="summary-val" style="color:var(--red)">${neverPlayed}</div>
      <div class="summary-lbl">Never started</div>
    </div>` : ''}
  `;
}

function renderCard(game) {
  const d = data[game.id];
  const days = daysSince(d.lastDailyDate);
  const badge = dailyBadge(days);
  const isToday = d.lastDailyDate === todayStr();
  const logOpen = logOpenMap[game.id] || false;

  const logHtml = (d.log || []).length === 0
    ? '<span style="font-size:12px;color:var(--text-3)">No history yet.</span>'
    : (d.log || []).slice().reverse().map(e => `
        <div class="log-entry">
          <div class="log-dot ${e.type === 'daily' ? 'log-dot-daily' : 'log-dot-backlog'}"></div>
          <span class="log-date">${formatDate(e.date)}</span>
          <span>${e.type === 'daily' ? 'Daily played' : `Backlog → #${e.backlogNumber}`}</span>
        </div>`).join('');

  return `
    <div class="game-card" data-game="${game.id}">
      <div class="card-header">
        <div class="card-icon">${game.icon}</div>
        <div>
          <div class="card-name">${game.name}</div>
        </div>
      </div>
      <div class="card-body">

        <!-- Daily track -->
        <div class="track">
          <div class="track-label">Daily</div>
          <div class="track-info">
            <div class="track-stat">
              <span class="badge ${badge.cls}">${badge.text}</span>
            </div>
            ${d.lastDailyDate ? `<div class="track-sub">Last: ${formatDate(d.lastDailyDate)}</div>` : ''}
          </div>
          <div class="track-actions">
            <button class="btn btn-sm btn-primary" data-action="daily" data-game="${game.id}" ${isToday ? 'disabled' : ''}>
              ${isToday ? '✓ Done' : '✓ Today'}
            </button>
          </div>
        </div>

        <div class="track-divider"></div>

        <!-- Backlog track -->
        <div class="track">
          <div class="track-label">Backlog</div>
          <div class="track-info">
            <div class="track-stat">#${d.backlogNumber || 0}</div>
            <div class="track-sub">Last completed</div>
          </div>
          <div class="track-actions">
            <div class="num-input-wrap">
              <button class="btn btn-icon" data-action="backlog-dec" data-game="${game.id}" title="−1">−</button>
              <input class="num-input" type="number" min="0" value="${d.backlogNumber || 0}"
                data-action="backlog-input" data-game="${game.id}" />
              <button class="btn btn-icon btn-primary" data-action="backlog-inc" data-game="${game.id}" title="+1">+</button>
            </div>
          </div>
        </div>

      </div>
      <div class="card-log">
        <div class="log-toggle" data-action="log-toggle" data-game="${game.id}">
          <span>${logOpen ? '▾' : '▸'}</span>
          <span>History (${(d.log || []).length})</span>
        </div>
        ${logOpen ? `<div class="log-list">${logHtml}</div>` : ''}
      </div>
    </div>`;
}

function render() {
  renderSummary();
  document.getElementById('games-grid').innerHTML = GAMES.map(g => renderCard(g)).join('');
}

// ── Actions ──────────────────────────────────────────────────────────────────
function markDaily(gameId) {
  const today = todayStr();
  data[gameId].lastDailyDate = today;
  data[gameId].log = data[gameId].log || [];
  data[gameId].log.push({ date: today, type: 'daily' });
  saveData(data);
  render();
}

function setBacklog(gameId, newNum) {
  newNum = Math.max(0, parseInt(newNum) || 0);
  data[gameId].backlogNumber = newNum;
  data[gameId].log = data[gameId].log || [];
  data[gameId].log.push({ date: todayStr(), type: 'backlog', backlogNumber: newNum });
  saveData(data);
  render();
}

// ── Modal ────────────────────────────────────────────────────────────────────
let modalGameId = null;

function openModal(gameId) {
  modalGameId = gameId;
  const game = GAMES.find(g => g.id === gameId);
  const d = data[gameId];
  document.getElementById('modal-title').textContent = `Edit ${game.name}`;
  document.getElementById('modal-daily-date').value = d.lastDailyDate || '';
  document.getElementById('modal-backlog-num').value = d.backlogNumber || 0;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalGameId = null;
}

function saveModal() {
  if (!modalGameId) return;
  const dateVal = document.getElementById('modal-daily-date').value.trim();
  const backlogVal = parseInt(document.getElementById('modal-backlog-num').value) || 0;
  data[modalGameId].lastDailyDate = dateVal || null;
  data[modalGameId].backlogNumber = Math.max(0, backlogVal);
  saveData(data);
  closeModal();
  render();
}

// ── Events ───────────────────────────────────────────────────────────────────
document.getElementById('games-grid').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const gameId = btn.dataset.game;

  if (action === 'daily') {
    markDaily(gameId);
  } else if (action === 'backlog-inc') {
    const curr = data[gameId].backlogNumber || 0;
    setBacklog(gameId, curr + 1);
  } else if (action === 'backlog-dec') {
    const curr = data[gameId].backlogNumber || 0;
    if (curr > 0) setBacklog(gameId, curr - 1);
  } else if (action === 'log-toggle') {
    logOpenMap[gameId] = !logOpenMap[gameId];
    render();
  }
});

document.getElementById('games-grid').addEventListener('change', e => {
  const inp = e.target.closest('[data-action="backlog-input"]');
  if (!inp) return;
  setBacklog(inp.dataset.game, inp.value);
});

document.getElementById('games-grid').addEventListener('keydown', e => {
  const inp = e.target.closest('[data-action="backlog-input"]');
  if (!inp) return;
  if (e.key === 'Enter') {
    setBacklog(inp.dataset.game, inp.value);
    inp.blur();
  }
});

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-save').addEventListener('click', saveModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Header date
const now = new Date();
document.getElementById('header-date').textContent = now.toLocaleDateString('en-GB', {
  weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
});

render();
</script>
</body>
</html>
