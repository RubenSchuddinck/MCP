<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wordle & Horsle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f0f0; color: #333; min-height: 100vh; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 2rem; margin-bottom: 10px; }
    .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .tab { padding: 10px 20px; border: 2px solid #ccc; background: #fff; cursor: pointer; border-radius: 6px; font-weight: 600; }
    .tab.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
    .game { display: none; }
    .game.active { display: block; }
    .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
    .tile { width: 100%; aspect-ratio: 1; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; border-radius: 4px; background: #fff; }
    .tile.filled { background: #999; color: #fff; border-color: #999; }
    .tile.correct { background: #22c55e; border-color: #22c55e; color: #fff; }
    .tile.present { background: #eab308; border-color: #eab308; color: #fff; }
    .tile.absent { background: #6b7280; border-color: #6b7280; color: #fff; }
    .keyboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(35px, 1fr)); gap: 4px; margin: 20px 0; }
    .key { padding: 8px 4px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; font-weight: 600; font-size: 11px; }
    .key:hover { background: #f0f0f0; }
    .key.used { background: #999; color: #fff; border-color: #999; }
    .message { text-align: center; margin: 15px 0; font-size: 1rem; font-weight: 600; min-height: 20px; }
    .message.win { color: #22c55e; }
    .message.lose { color: #dc2626; }
    .info { text-align: center; color: #666; font-size: 0.9rem; margin-top: 20px; }
    .btn { padding: 10px 20px; background: #7c3aed; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 20px; width: 100%; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📖 Wordle & 🐴 Horsle</h1>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchGame('wordle')">📖 Wordle</button>
    <button class="tab" onclick="switchGame('horsle')">🐴 Horsle</button>
  </div>

  <div id="wordle" class="game active"></div>
  <div id="horsle" class="game"></div>
</div>

<script>
const WORDS = {
  wordle: ['ABOUT','ABOVE','ABUSE','ADMIT','ADOPT','ADULT','AFTER','AGAIN','AGENT','AGREE','AHEAD','ALARM','ALBUM','ALERT','ALIEN','ALIGN','ALIKE','ALIVE','ALLOW','ALONE','ALONG','ALTER','ANGEL','ANGER','ANGLE','ANGRY','APART','APPLE','APPLY','ARENA','ARGUE','ARISE','ARRAY','ARROW','ASIDE','ASSET','ATLAS','ATTIC','AUDIO','AUDIT','AUNTY','AVOID','AWAKE','AWARD','AWARE','BADLY','BAGEL','BAKER','BASES','BASIC','BASIS','BEACH','BEGAN','BEGIN','BEING','BELOW','BENCH','BILLY','BINGE','BINGO','BIOME','BIRTH','BLACK','BLADE','BLAME','BLANK','BLAZE','BLEAK','BLEEP','BLEND','BLESS','BLIND','BLINK','BLISS','BLOCK','BLOOD','BLOOM','BLOWN','BLUES','BOARD','BOAST','BOOST','BOOTH','BOOZE','BOUND','BRACE','BRAIN','BRAND','BRAVE','BREAD','BREAK','BREED','BRICK','BRIDE','BRIEF','BRING','BRINK','BRISK','BROAD','BROKE','BROOD','BROOK','BROOM','BROTH','BROWN','BUILD','BUILT','BUNCH','BUNNY','BURST','BUSHY','BUYER'],
  horsle: ['CANTER','CHASE','CHESTNUT','CLAMP','CLASP','COACH','CORAL','CREAM','CRISP','CROSS','CROWD','DERBY','DONKEY','DRAFT','DRANK','DRAWN','DREAM','DREAMY','DRENCH','DRINK','DROVE','DROWN','EAGER','EARLY','EARTH','EQUINE','FAVOR','FEAST','FENCE','FILLY','FINAL','FLAIR','FLANK','FLASH','FLOAT','FLOCK','FLOOD','FLORA','FLOUR','FLOWN','FLUID','FOAL','FOCUS','FORGE','FORTE','FORUM','FOUND','FRAME','FRANK','FRAUD','FREAK','FRESH','FRIED','FRIEND','FRIGHT','FRIZZ','FRONT','FROST','FROTH','FROWN','FROZE','FRUIT','FULLY','FUNKY','FUNNY','FUZZY','GALA','GAMER','GIANT','GIDDY','GLADE','GLAND','GLASS','GLAZE','GLEAM','GLEAN','GLIDE','GLOBE','GLOOM','GLORY','GLOSS','GLOVE','GRACE','GRADE','GRAIN','GRAMS','GRAND','GRANT','GRAPE','GRASS','GRATE','GRAVE','GRAZE','GREAT','GREED','GREEN','GREET','GRIEF','GRILL','GRIME','GRIND','GRINDY','GROAN','GROOM','GROSS','GROUP','GROVE','GROW','GRUEL','GRUNT','GUARD','GUAVA','GUESS','GUEST','GUIDE','GUILD','GUILT','GUITAR']
};

class Wordle {
  constructor(wordList) {
    this.wordList = wordList;
    this.answer = this.getAnswer();
    this.guesses = [];
    this.gameOver = false;
    this.won = false;
  }

  getAnswer() {
    const today = new Date().toISOString().slice(0, 10);
    const seed = today.split('-').reduce((a, b) => a + parseInt(b), 0);
    return this.wordList[seed % this.wordList.length];
  }

  guess(word) {
    word = word.toUpperCase();
    if (word.length !== 5) return { ok: false, msg: 'Need 5 letters' };
    if (!this.wordList.includes(word)) return { ok: false, msg: 'Not in list' };
    if (this.guesses.includes(word)) return { ok: false, msg: 'Already guessed' };

    this.guesses.push(word);
    const scores = this.score(word);

    if (word === this.answer) {
      this.gameOver = true;
      this.won = true;
      return { ok: true, scores, gameOver: true, won: true };
    }
    if (this.guesses.length >= 6) {
      this.gameOver = true;
      return { ok: true, scores, gameOver: true, won: false, answer: this.answer };
    }
    return { ok: true, scores };
  }

  score(word) {
    const result = [];
    const ansChars = this.answer.split('');
    const used = [];

    for (let i = 0; i < 5; i++) {
      if (word[i] === ansChars[i]) {
        result[i] = 'correct';
        used[i] = true;
      }
    }

    for (let i = 0; i < 5; i++) {
      if (result[i]) continue;
      let found = false;
      for (let j = 0; j < 5; j++) {
        if (!used[j] && word[i] === ansChars[j]) {
          result[i] = 'present';
          used[j] = true;
          found = true;
          break;
        }
      }
      if (!found) result[i] = 'absent';
    }
    return result;
  }
}

let games = { wordle: new Wordle(WORDS.wordle), horsle: new Wordle(WORDS.horsle) };
let currentGame = 'wordle';
let input = '';
let usedKeys = {};

function render() {
  const gameId = currentGame;
  const game = games[gameId];
  const container = document.getElementById(gameId);

  let html = '<div class="board">';
  for (let i = 0; i < 6; i++) {
    for (let j = 0; j < 5; j++) {
      let char = '';
      let cls = '';
      if (i < game.guesses.length) {
        char = game.guesses[i][j];
        const scores = game.score(game.guesses[i]);
        cls = scores[j];
      } else if (i === game.guesses.length) {
        char = input[j] || '';
        if (char) cls = 'filled';
      }
      html += `<div class="tile ${cls}">${char}</div>`;
    }
  }
  html += '</div>';

  html += '<div class="keyboard">';
  'QWERTYUIOPASDFGHJKLZXCVBNM'.split('').forEach(k => {
    const status = usedKeys[k] || '';
    html += `<button class="key ${status}" onclick="type('${k}')">${k}</button>`;
  });
  html += '</div>';

  html += '<div class="message" id="msg"></div>';

  if (game.gameOver) {
    if (game.won) {
      html += `<div class="message win">Won in ${game.guesses.length}! 🎉</div>`;
    } else {
      html += `<div class="message lose">Game over! Answer: ${game.answer}</div>`;
    }
    html += `<button class="btn" onclick="newGame('${gameId}')">New Game</button>`;
  }

  container.innerHTML = html;
}

function type(key) {
  if (games[currentGame].gameOver) return;
  const game = games[currentGame];

  if (key === 'BACKSPACE' || key === '⌫') {
    input = input.slice(0, -1);
  } else if (key === 'ENTER') {
    if (input.length === 5) {
      const res = game.guess(input);
      if (res.ok) {
        res.scores.forEach((s, i) => {
          const key = input[i];
          if (s === 'correct' && (!usedKeys[key] || usedKeys[key] !== 'correct')) {
            usedKeys[key] = 'correct';
          } else if (s === 'present' && usedKeys[key] !== 'correct') {
            usedKeys[key] = 'used';
          } else if (s === 'absent' && !usedKeys[key]) {
            usedKeys[key] = 'used';
          }
        });
        input = '';
        render();
      } else {
        document.getElementById('msg').textContent = res.msg;
      }
    }
  } else if (input.length < 5) {
    input += key;
  }
  render();
}

function switchGame(gameId) {
  currentGame = gameId;
  input = '';
  usedKeys = {};
  document.querySelectorAll('.game').forEach(g => g.classList.remove('active'));
  document.getElementById(gameId).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function newGame(gameId) {
  games[gameId] = new Wordle(WORDS[gameId]);
  currentGame = gameId;
  input = '';
  usedKeys = {};
  render();
}

document.addEventListener('keydown', e => {
  if (games[currentGame].gameOver) return;
  if (e.key === 'Backspace') type('BACKSPACE');
  else if (e.key === 'Enter') type('ENTER');
  else if (/^[a-z]$/i.test(e.key)) type(e.key.toUpperCase());
});

render();
</script>
</body>
</html>
