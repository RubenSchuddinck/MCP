<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One Piece Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --surface: rgba(255,255,255,.86); --surface-solid: #ffffff;
      --border: rgba(120,150,190,.28);
      --text: #0d2233; --text-2: #3f5871; --text-3: #8095ac;
      --primary: #1565c0; --primary-2: #0d3c8a; --primary-bg: #e8f1fc;
      --gold: #f0b429; --gold-2: #ffd76b; --done: #16a36b; --done-bg: #e3f7ee;
      --radius: 16px;
      --shadow: 0 2px 8px rgba(7,38,72,.12), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 8px 26px rgba(7,38,72,.18);
      --transition: .2s ease;
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5;
      overflow-x: hidden; position: relative;
    }

    /* ── OCEAN BACKGROUND (fixed, behind everything) ── */
    .sky {
      position: fixed; inset: 0; z-index: -3;
      background:
        radial-gradient(1100px 520px at 78% -8%, #ffe9a8 0%, rgba(255,233,168,0) 60%),
        linear-gradient(180deg, #7ec8f0 0%, #9fdcf2 26%, #bfeaf2 40%, #2f8fd0 58%, #155fae 78%, #0c3f86 100%);
    }
    .sun {
      position: fixed; top: 7vh; right: 12vw; width: 120px; height: 120px; z-index: -3;
      border-radius: 50%; background: radial-gradient(circle, #fff6d8 0%, #ffd76b 45%, #ffb73d 75%, rgba(255,183,61,0) 80%);
      filter: blur(.3px); animation: sun-glow 6s ease-in-out infinite;
    }
    @keyframes sun-glow { 0%,100% { transform: scale(1); opacity: .92; } 50% { transform: scale(1.07); opacity: 1; } }

    .cloud { position: fixed; z-index: -3; color: #fff; opacity: .85; filter: drop-shadow(0 6px 10px rgba(0,40,80,.10)); pointer-events: none; }
    .cloud svg { display: block; }
    .cloud.c1 { top: 12vh; left: -180px; animation: drift 46s linear infinite; }
    .cloud.c2 { top: 22vh; left: -260px; transform: scale(.7); opacity: .65; animation: drift 66s linear infinite 6s; }
    .cloud.c3 { top: 5vh; left: -220px; transform: scale(1.15); opacity: .7; animation: drift 82s linear infinite 12s; }
    @keyframes drift { from { transform: translateX(0) translateZ(0); } to { transform: translateX(118vw); } }

    /* layered animated waves anchored to bottom */
    .waves { position: fixed; left: 0; right: 0; bottom: 0; z-index: -2; line-height: 0; pointer-events: none; }
    .waves svg { display: block; width: 200%; height: 130px; }
    .waves .w1 { animation: wave 11s linear infinite; opacity: .55; }
    .waves .w2 { animation: wave 17s linear infinite reverse; opacity: .4; margin-top: -118px; }
    .waves .w3 { animation: wave 26s linear infinite; opacity: .3; margin-top: -118px; }
    @keyframes wave { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .ghost-skull {
      position: fixed; z-index: -2; bottom: 6vh; left: 50%; transform: translateX(-50%);
      font-size: 30vmin; opacity: .05; filter: blur(1px); pointer-events: none; user-select: none;
      animation: bob 7s ease-in-out infinite;
    }
    @keyframes bob { 0%,100% { transform: translateX(-50%) translateY(0) rotate(-3deg); } 50% { transform: translateX(-50%) translateY(-14px) rotate(3deg); } }

    #confetti-canvas { position: fixed; inset: 0; z-index: 9999; pointer-events: none; display: none; }

    /* ── HEADER ── */
    .app-header {
      position: sticky; top: 0; z-index: 100; color: #fff;
      background: linear-gradient(135deg, #0d3c8a 0%, #1565c0 55%, #1f7fd0 100%);
      box-shadow: var(--shadow-md);
      border-bottom: 3px solid var(--gold);
    }
    .header-top { display: flex; align-items: center; gap: 14px; padding: 16px 22px 12px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { font-size: 2.1rem; line-height: 1; animation: flag 3.2s ease-in-out infinite; transform-origin: bottom left; }
    @keyframes flag { 0%,100% { transform: rotate(-7deg); } 50% { transform: rotate(7deg); } }
    .brand-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -.02em; text-shadow: 0 2px 6px rgba(0,0,0,.25); }
    .brand-title .accent { color: var(--gold-2); }
    .brand-sub { font-size: .8rem; opacity: .85; font-weight: 600; letter-spacing: .02em; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 9px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px; height: 38px; padding: 0 15px;
      border: 1.5px solid rgba(255,255,255,.5); border-radius: 11px; background: rgba(255,255,255,.14);
      color: #fff; font-size: 13.5px; font-weight: 700; cursor: pointer; transition: all var(--transition); white-space: nowrap;
      backdrop-filter: blur(4px);
    }
    .btn:hover { background: rgba(255,255,255,.28); border-color: #fff; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.gold { background: var(--gold); border-color: var(--gold); color: #4a3500; }
    .btn.gold:hover { background: var(--gold-2); }
    .btn.playing { background: var(--gold); border-color: var(--gold); color: #4a3500; }

    /* ── OVERALL PROGRESS ── */
    .overall { padding: 2px 22px 22px; }
    .overall-stats { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
    .overall-pct { font-size: 2.1rem; font-weight: 900; letter-spacing: -.02em; text-shadow: 0 2px 6px rgba(0,0,0,.22); }
    .overall-meta { font-size: .9rem; opacity: .92; font-weight: 600; }
    .overall-current { margin-left: auto; font-size: .86rem; background: rgba(255,255,255,.18); padding: 6px 14px; border-radius: 20px; font-weight: 700; border: 1px solid rgba(255,255,255,.25); animation: pulse 2.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,215,107,.0); } 50% { box-shadow: 0 0 0 5px rgba(255,215,107,.18); } }
    .bar { height: 14px; border-radius: 20px; background: rgba(255,255,255,.22); overflow: hidden; position: relative; }
    .bar > span { display: block; height: 100%; border-radius: 20px; background: linear-gradient(90deg, var(--gold), var(--gold-2)); transition: width .55s cubic-bezier(.22,1,.36,1); position: relative; }
    /* moving shimmer on filled bars */
    .bar > span::after {
      content: ""; position: absolute; inset: 0; border-radius: 20px;
      background: linear-gradient(100deg, transparent 20%, rgba(255,255,255,.55) 50%, transparent 80%);
      background-size: 200% 100%; animation: shimmer 2.4s linear infinite;
    }

    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* ── VOYAGE STATS ── */
    .voyage { max-width: 940px; margin: 24px auto 0; padding: 0 18px; }
    .stats-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px 18px; backdrop-filter: blur(10px) saturate(1.1);
      -webkit-backdrop-filter: blur(10px) saturate(1.1); border-top: 4px solid var(--gold);
    }
    .stat-chips { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; }
    .stat { display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-radius: 12px; background: linear-gradient(135deg, rgba(21,101,192,.07), rgba(240,180,41,.07)); border: 1px solid var(--border); }
    .stat-ic { font-size: 1.5rem; line-height: 1; }
    .stat-lab { font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); font-weight: 800; }
    .stat-val { font-size: .98rem; font-weight: 800; color: var(--text); line-height: 1.25; }
    .stat-val small { font-weight: 600; color: var(--text-2); font-size: .82rem; }
    .activity { margin-top: 14px; }
    .activity summary { cursor: pointer; font-weight: 800; font-size: .85rem; color: var(--primary); user-select: none; list-style: none; display: flex; align-items: center; gap: 6px; }
    .activity summary::-webkit-details-marker { display: none; }
    .activity summary::before { content: "▸"; transition: transform .2s ease; }
    .activity[open] summary::before { transform: rotate(90deg); }
    .activity ul { list-style: none; margin: 10px 0 2px; max-height: 230px; overflow-y: auto; }
    .activity li { display: flex; gap: 10px; padding: 7px 4px; border-bottom: 1px dashed var(--border); font-size: .84rem; }
    .activity li:last-child { border-bottom: none; }
    .act-date { color: var(--text-3); font-weight: 700; white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 116px; }
    .act-text { color: var(--text-2); font-weight: 600; }
    .act-empty { color: var(--text-3); font-size: .84rem; padding: 6px 4px; }

    /* ── LAYOUT ── */
    .wrap { max-width: 940px; margin: 0 auto; padding: 26px 18px 80px; }
    .saga {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 18px; box-shadow: var(--shadow); overflow: hidden;
      backdrop-filter: blur(10px) saturate(1.1); -webkit-backdrop-filter: blur(10px) saturate(1.1);
      border-left: 5px solid hsl(var(--hue,210) 70% 52%);
      opacity: 0; transform: translateY(16px); animation: rise .5s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    .saga-head { display: flex; align-items: center; gap: 14px; padding: 16px 18px; cursor: pointer; user-select: none; transition: background var(--transition); }
    .saga-head:hover { background: rgba(21,101,192,.07); }
    .saga-chevron { font-size: .8rem; color: hsl(var(--hue,210) 60% 45%); transition: transform .3s ease; flex-shrink: 0; }
    .saga.collapsed .saga-chevron { transform: rotate(-90deg); }
    .saga-name { font-size: 1.1rem; font-weight: 800; flex-shrink: 0; color: var(--text); letter-spacing: -.01em; }
    .saga-badge { font-size: 1.05rem; }
    .saga-progress { flex: 1; min-width: 80px; display: flex; align-items: center; gap: 10px; }
    .saga-progress .bar { flex: 1; height: 9px; background: rgba(120,150,190,.18); }
    .saga-progress .bar > span { background: linear-gradient(90deg, hsl(var(--hue,210) 75% 50%), hsl(var(--hue,210) 80% 65%)); }
    .saga-progress.full .bar > span { background: linear-gradient(90deg, var(--done), #57d39d); }
    .saga-count { font-size: .8rem; color: var(--text-2); font-weight: 700; min-width: 72px; text-align: right; font-variant-numeric: tabular-nums; }
    .saga-body { display: none; border-top: 1px solid var(--border); }
    .saga:not(.collapsed) .saga-body { display: block; animation: fade .35s ease; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

    /* ── ARC ROW ── */
    .arc { display: flex; align-items: center; gap: 14px; padding: 13px 18px; border-bottom: 1px solid var(--border); transition: background var(--transition); }
    .arc:last-child { border-bottom: none; }
    .arc:hover { background: rgba(21,101,192,.05); }
    .arc.done { background: var(--done-bg); }
    .arc-check {
      width: 26px; height: 26px; border-radius: 8px; border: 2px solid var(--border); background: var(--surface-solid);
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 15px; transition: all var(--transition);
    }
    .arc-check:hover { border-color: var(--primary); transform: scale(1.08); }
    .arc.done .arc-check { background: var(--done); border-color: var(--done); animation: pop .35s cubic-bezier(.34,1.56,.64,1); }
    @keyframes pop { 0% { transform: scale(.4); } 60% { transform: scale(1.18); } 100% { transform: scale(1); } }
    .arc-main { flex: 1; min-width: 0; }
    .arc-name { font-weight: 700; font-size: 1rem; }
    .arc-eps { font-size: .78rem; color: var(--text-3); font-weight: 500; }
    .arc-progress { display: flex; align-items: center; gap: 9px; min-width: 210px; }
    .arc-progress .bar { flex: 1; height: 8px; background: rgba(120,150,190,.18); }
    .arc-progress .bar > span { background: linear-gradient(90deg, var(--primary), #5aa6e6); }
    .arc.done .arc-progress .bar > span { background: linear-gradient(90deg, var(--done), #57d39d); }
    .arc-count { font-size: .78rem; color: var(--text-2); font-weight: 700; min-width: 58px; text-align: right; font-variant-numeric: tabular-nums; }
    .stepper { display: flex; align-items: center; gap: 3px; }
    .step-btn { width: 28px; height: 28px; border: 1.5px solid var(--border); background: var(--surface-solid); border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 800; color: var(--text-2); line-height: 1; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .step-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-bg); transform: translateY(-1px); }
    .step-btn:disabled { opacity: .3; cursor: default; }

    /* ── STATS PAGE ── */
    .stats-page { padding-top: 24px; }
    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 18px; }
    .kpi {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 15px 16px;
      box-shadow: var(--shadow); backdrop-filter: blur(10px) saturate(1.1); -webkit-backdrop-filter: blur(10px) saturate(1.1);
      border-top: 4px solid hsl(var(--hue,210) 75% 52%);
    }
    .kpi-val { font-size: 1.7rem; font-weight: 900; letter-spacing: -.02em; color: var(--text); line-height: 1.1; }
    .kpi-lab { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); font-weight: 800; margin-top: 4px; }
    .kpi-sub { font-size: .76rem; color: var(--text-2); font-weight: 600; margin-top: 2px; }
    .chart-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px 12px;
      box-shadow: var(--shadow); margin-bottom: 16px; backdrop-filter: blur(10px) saturate(1.1); -webkit-backdrop-filter: blur(10px) saturate(1.1);
    }
    .chart-card h3 { font-size: .95rem; font-weight: 800; color: var(--text); margin-bottom: 12px; letter-spacing: -.01em; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .chart-host { width: 100%; }
    .chart-host svg { width: 100%; height: auto; display: block; overflow: visible; }
    .chart-empty { color: var(--text-3); font-size: .86rem; padding: 24px 4px; text-align: center; font-weight: 600; }
    .c-grid { stroke: rgba(120,150,190,.25); stroke-width: 1; }
    .c-axis { fill: var(--text-3); font-size: 10px; font-weight: 700; }
    .c-line { fill: none; stroke: var(--primary); stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; }
    .c-goal { stroke: var(--gold); stroke-width: 1.5; stroke-dasharray: 5 4; }
    .c-goal-lab { fill: #b07d00; font-size: 10px; font-weight: 800; }
    .saga-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .saga-bar-name { width: 130px; flex-shrink: 0; font-size: .82rem; font-weight: 700; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .saga-bar-track { flex: 1; height: 16px; background: rgba(120,150,190,.16); border-radius: 8px; overflow: hidden; }
    .saga-bar-fill { height: 100%; border-radius: 8px; transition: width .6s cubic-bezier(.22,1,.36,1); }
    .saga-bar-val { width: 64px; text-align: right; font-size: .78rem; font-weight: 700; color: var(--text-2); font-variant-numeric: tabular-nums; }
    @media (max-width: 640px) { .chart-grid { grid-template-columns: 1fr; } .saga-bar-name { width: 92px; } }

    .loading, .errbox { text-align: center; padding: 70px 20px; color: var(--surface-solid); font-weight: 600; font-size: 1.05rem; text-shadow: 0 1px 3px rgba(0,0,0,.25); }
    .loading .spin { display: inline-block; animation: spin 1.6s linear infinite; font-size: 1.6rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .errbox { color: #ffd5d0; }

    @media (max-width: 640px) {
      .arc { flex-wrap: wrap; }
      .arc-progress { min-width: 100%; order: 3; padding-left: 40px; }
      .overall-current { margin-left: 0; }
      .sun { width: 80px; height: 80px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <!-- ocean scene -->
  <div class="sky"></div>
  <div class="sun"></div>
  <div class="cloud c1"><svg width="170" height="60" viewBox="0 0 170 60"><path fill="currentColor" d="M30 50c-16 0-28-9-28-21S15 9 30 11C36 1 56-3 66 8c14-9 34-3 36 13 16-2 28 7 28 18s-12 11-28 11z"/></svg></div>
  <div class="cloud c2"><svg width="170" height="60" viewBox="0 0 170 60"><path fill="currentColor" d="M30 50c-16 0-28-9-28-21S15 9 30 11C36 1 56-3 66 8c14-9 34-3 36 13 16-2 28 7 28 18s-12 11-28 11z"/></svg></div>
  <div class="cloud c3"><svg width="170" height="60" viewBox="0 0 170 60"><path fill="currentColor" d="M30 50c-16 0-28-9-28-21S15 9 30 11C36 1 56-3 66 8c14-9 34-3 36 13 16-2 28 7 28 18s-12 11-28 11z"/></svg></div>
  <div class="ghost-skull">☠️</div>
  <div class="waves" aria-hidden="true">
    <svg class="w1" viewBox="0 0 1200 130" preserveAspectRatio="none"><path fill="#bfeaf2" d="M0 50c150 40 300 40 450 10s300-50 450-20 250 40 300 30v60H0z"/></svg>
    <svg class="w2" viewBox="0 0 1200 130" preserveAspectRatio="none"><path fill="#5fb3e0" d="M0 60c180 30 320-20 480-10s280 50 440 30 220-30 280-20v70H0z"/></svg>
    <svg class="w3" viewBox="0 0 1200 130" preserveAspectRatio="none"><path fill="#1f7fd0" d="M0 70c200 20 340 30 520 0s260-30 420-10 200 30 260 20v60H0z"/></svg>
  </div>
  <canvas id="confetti-canvas"></canvas>

  <header class="app-header">
    <div class="header-top">
      <div class="brand">
        <span class="brand-icon">🏴‍☠️</span>
        <div>
          <div class="brand-title">One Piece <span class="accent">Tracker</span></div>
          <div class="brand-sub">⚓ Your voyage through the Grand Line</div>
        </div>
      </div>
      <div class="header-right">
        <button class="btn" id="view-btn" title="View stats &amp; charts">📊 Stats</button>
        <button class="btn gold" id="music-btn" title="Play a sea shanty">🎵 Shanty</button>
        <button class="btn" id="expand-all">⤢ Expand all</button>
        <button class="btn" id="reset-btn">↺ Reset</button>
      </div>
    </div>
    <div class="overall">
      <div class="overall-stats">
        <span class="overall-pct" id="ov-pct">0%</span>
        <span class="overall-meta" id="ov-meta">0 / 0 episodes watched</span>
        <span class="overall-current" id="ov-current">⚓ Set sail!</span>
      </div>
      <div class="bar"><span id="ov-bar" style="width:0%"></span></div>
    </div>
  </header>

  <section class="voyage">
    <div class="stats-card">
      <div class="stat-chips" id="stat-chips"></div>
      <details class="activity">
        <summary>📜 Recent activity — saved for your dashboard</summary>
        <ul id="activity-list"></ul>
      </details>
    </div>
  </section>

  <main class="wrap" id="content">
    <div class="loading"><span class="spin">🧭</span><br>Charting your course…</div>
  </main>

  <section class="wrap stats-page" id="stats-view" hidden>
    <div class="kpis" id="kpis"></div>
    <div class="chart-card"><h3>📈 Cumulative episodes watched</h3><div class="chart-host" id="chart-cum"></div></div>
    <div class="chart-grid">
      <div class="chart-card"><h3>📊 Episodes per day</h3><div class="chart-host" id="chart-day"></div></div>
      <div class="chart-card"><h3>📅 By weekday</h3><div class="chart-host" id="chart-dow"></div></div>
    </div>
    <div class="chart-card"><h3>🗺️ Progress by saga</h3><div class="chart-host" id="chart-saga"></div></div>
  </section>

  <script>
    // ── API ───────────────────────────────────────────────────────────────────────
    // Keep the Caddy path prefix (e.g. /onepiece) intact — only strip a
    // trailing index.html and/or slash so API calls stay under the prefix.
    const BASE = window.location.pathname.replace(/index\.html$/, '').replace(/\/+$/, '') + '/';
    async function apiGet() { const r = await fetch(BASE + 'api/onepiece'); if (!r.ok) throw new Error('API error'); return r.json(); }
    async function apiPut(id, arc) { const r = await fetch(BASE + 'api/onepiece/' + id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(arc) }); if (!r.ok) throw new Error('Save failed'); return r.json(); }
    async function apiReset() { const r = await fetch(BASE + 'api/onepiece/reset', { method: 'POST' }); if (!r.ok) throw new Error('Reset failed'); return r.json(); }
    async function apiGetLog() { const r = await fetch(BASE + 'api/onepiece/log'); if (!r.ok) throw new Error('Log error'); return r.json(); }

    // ── Personal facts (used for the voyage stats) ──────────────────────────────────
    const BIRTH = '1999-03-19';   // born 19 March 1999
    const START = '2026-04-08';   // started watching One Piece on 8 April 2026

    // ── State ─────────────────────────────────────────────────────────────────────
    const S = { arcs: [], log: [], collapsed: new Set() };

    // ── Helpers ───────────────────────────────────────────────────────────────────
    const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    function sagaOrder() { const seen = []; S.arcs.forEach((a) => { if (!seen.includes(a.saga)) seen.push(a.saga); }); return seen; }
    function arcsOf(saga) { return S.arcs.filter((a) => a.saga === saga); }
    function sumWatched(arcs) { return arcs.reduce((n, a) => n + (a.watchedCount || 0), 0); }
    function sumTotal(arcs) { return arcs.reduce((n, a) => n + (a.epCount || 0), 0); }
    function pct(w, t) { return t ? Math.round((w / t) * 100) : 0; }
    // Stable per-saga accent hue so each saga gets its own colour.
    function hueFor(s) { let h = 0; for (const ch of s) h = (h * 31 + ch.charCodeAt(0)) % 360; return h; }

    // ── Date helpers ────────────────────────────────────────────────────────────────
    const DAY = 86400000;
    function ageAt(iso, at) {
      const b = new Date(iso), n = new Date(at);
      let a = n.getFullYear() - b.getFullYear();
      const m = n.getMonth() - b.getMonth();
      if (m < 0 || (m === 0 && n.getDate() < b.getDate())) a--;
      return a;
    }
    function ageFrom(iso) { return ageAt(iso, new Date()); }
    function daysBetween(a, b) { return Math.max(0, Math.floor((b - a) / DAY)); }
    function fmtDate(d) { return new Date(d).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); }
    function fmtDateTime(d) { return new Date(d).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) + ', ' + new Date(d).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' }); }

    // First episode not yet watched, scanning arcs in canonical order.
    function currentEpisode() {
      for (const a of S.arcs) {
        if ((a.watchedCount || 0) < a.epCount) return { ep: a.epStart + (a.watchedCount || 0), arc: a.name };
      }
      return null;
    }

    // ── Render ──────────────────────────────────────────────────────────────────────
    function renderOverall() {
      const w = sumWatched(S.arcs), t = sumTotal(S.arcs), p = pct(w, t);
      document.getElementById('ov-pct').textContent = p + '%';
      document.getElementById('ov-meta').textContent = w + ' / ' + t + ' episodes watched';
      document.getElementById('ov-bar').style.width = p + '%';
      const cur = currentEpisode();
      document.getElementById('ov-current').textContent = cur
        ? '⚓ Up next: Ep ' + cur.ep + ' · ' + cur.arc
        : '👑 All caught up — King of the Pirates!';
    }

    function arcRow(a) {
      const w = a.watchedCount || 0, p = pct(w, a.epCount), done = w >= a.epCount;
      return `<div class="arc ${done ? 'done' : ''}" data-id="${a.id}">
        <div class="arc-check" data-act="toggle" title="${done ? 'Mark unwatched' : 'Mark arc watched'}">${done ? '✓' : ''}</div>
        <div class="arc-main">
          <div class="arc-name">${esc(a.name)}</div>
          <div class="arc-eps">Episodes ${a.epStart}–${a.epEnd} · ${a.epCount} eps</div>
        </div>
        <div class="arc-progress">
          <div class="stepper">
            <button class="step-btn" data-act="dec" ${w <= 0 ? 'disabled' : ''}>−</button>
            <button class="step-btn" data-act="inc" ${w >= a.epCount ? 'disabled' : ''}>+</button>
          </div>
          <div class="bar"><span style="width:${p}%"></span></div>
          <div class="arc-count">${w} / ${a.epCount}</div>
        </div>
      </div>`;
    }

    function sagaCard(saga, i) {
      const arcs = arcsOf(saga), w = sumWatched(arcs), t = sumTotal(arcs), p = pct(w, t);
      const collapsed = S.collapsed.has(saga), full = w >= t && t > 0;
      return `<section class="saga ${collapsed ? 'collapsed' : ''}" data-saga="${esc(saga)}"
                style="--hue:${hueFor(saga)}; animation-delay:${i * 55}ms">
        <div class="saga-head" data-act="toggle-saga">
          <span class="saga-chevron">▼</span>
          <span class="saga-badge">${full ? '🏆' : '🗺️'}</span>
          <span class="saga-name">${esc(saga)}</span>
          <div class="saga-progress ${full ? 'full' : ''}">
            <div class="bar"><span style="width:${p}%"></span></div>
          </div>
          <span class="saga-count">${w} / ${t} eps</span>
        </div>
        <div class="saga-body">${arcs.map(arcRow).join('')}</div>
      </section>`;
    }

    // Voyage stats: live age, days watching, average pace, projected/actual finish.
    function chip(ic, lab, val) {
      return `<div class="stat"><span class="stat-ic">${ic}</span><div><div class="stat-lab">${lab}</div><div class="stat-val">${val}</div></div></div>`;
    }
    function renderStats() {
      const now = new Date(), start = new Date(START);
      const watched = sumWatched(S.arcs), total = sumTotal(S.arcs);
      const days = Math.max(1, daysBetween(start, now));
      const avg = watched / days;            // episodes per day so far
      const remaining = total - watched;
      const complete = total > 0 && remaining <= 0;

      let finish;
      if (complete) {
        const last = [...S.log].reverse().find((e) => e.ts);
        const fdate = last ? new Date(last.ts) : now;
        const fdays = Math.max(1, daysBetween(start, fdate));
        finish = chip('🏁', 'Finished 🎉', `${fmtDate(fdate)}<br><small>${(total / fdays).toFixed(2)} eps/day · you were ${ageAt(BIRTH, fdate)}</small>`);
      } else if (avg > 0 && watched > 0) {
        const projDays = Math.ceil(remaining / avg);
        const proj = new Date(now.getTime() + projDays * DAY);
        finish = chip('🏁', 'Projected finish', `${fmtDate(proj)}<br><small>~${projDays} days · you'll be ${ageAt(BIRTH, proj)}</small>`);
      } else {
        finish = chip('🏁', 'Projected finish', `<small>Log an episode to see an estimate</small>`);
      }

      document.getElementById('stat-chips').innerHTML =
        chip('🎂', 'Your age', `${ageFrom(BIRTH)} years <small>· born 19 Mar 1999</small>`) +
        chip('🧭', 'Watching since', `${fmtDate(start)} <small>· ${days} day${days === 1 ? '' : 's'}</small>`) +
        chip('⚡', 'Average pace', `${avg.toFixed(2)} eps/day <small>· ${watched}/${total} eps</small>`) +
        finish;

      // recent activity (most recent first) — the data your dashboard can use
      const items = [...S.log].reverse().slice(0, 14).map((e) => {
        let text;
        if (e.type === 'reset') text = '↺ Reset all progress';
        else if (e.episodesWatched) text = `📺 Watched eps ${e.episodesWatched[0]}–${e.episodesWatched[1]} · ${esc(e.arcName)}`;
        else if (e.delta < 0) text = `↩︎ Unmarked ${-e.delta} ep${e.delta === -1 ? '' : 's'} · ${esc(e.arcName)}`;
        else text = `${esc(e.arcName || '')}`;
        return `<li><span class="act-date">${fmtDateTime(e.ts)}</span><span class="act-text">${text}</span></li>`;
      }).join('');
      document.getElementById('activity-list').innerHTML = items || '<li class="act-empty">No activity logged yet — mark some episodes watched.</li>';
    }

    function render() {
      document.getElementById('content').innerHTML = sagaOrder().map(sagaCard).join('');
      renderOverall();
      renderStats();
      if (currentView === 'stats') renderStatsPage();
    }

    // ── STATS PAGE (inline SVG charts from the watch log) ───────────────────────────
    let currentView = 'tracker';
    function switchView(v) {
      currentView = v;
      const stats = v === 'stats';
      document.getElementById('stats-view').hidden = !stats;
      document.getElementById('content').hidden = stats;
      document.querySelector('.voyage').hidden = stats;
      document.getElementById('expand-all').style.display = stats ? 'none' : '';
      const btn = document.getElementById('view-btn');
      btn.textContent = stats ? '📖 Tracker' : '📊 Stats';
      if (location.hash !== (stats ? '#stats' : '')) location.hash = stats ? 'stats' : '';
      if (stats) renderStatsPage();
      window.scrollTo(0, 0);
    }
    document.getElementById('view-btn').addEventListener('click', () => switchView(currentView === 'stats' ? 'tracker' : 'stats'));
    window.addEventListener('hashchange', () => switchView(location.hash === '#stats' ? 'stats' : 'tracker'));

    // Turn the log into a chronological timeline (handles resets) + per-day totals.
    function buildTimeline() {
      const events = S.log.filter((e) => e.ts).slice().sort((a, b) => new Date(a.ts) - new Date(b.ts));
      const perDay = {}, perDow = [0, 0, 0, 0, 0, 0, 0]; let running = 0; const cum = [];
      for (const e of events) {
        if (e.type === 'reset') { running = 0; cum.push({ t: new Date(e.ts), y: 0 }); continue; }
        const d = e.delta || 0, day = e.ts.slice(0, 10);
        running += d; cum.push({ t: new Date(e.ts), y: running });
        perDay[day] = (perDay[day] || 0) + d;
        if (d > 0) perDow[new Date(e.ts).getDay()] += d;
      }
      return { cum, perDay, perDow };
    }

    const niceMax = (v) => { if (v <= 5) return 5; const p = Math.pow(10, Math.floor(Math.log10(v))); return Math.ceil(v / p) * p; };
    const emptyChart = (msg) => `<div class="chart-empty">${msg}</div>`;
    const shortDate = (t) => new Date(t).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });

    function lineChart(cum, total) {
      if (!cum.length) return emptyChart('No episodes logged yet — start watching!');
      const W = 720, H = 240, pad = { l: 42, r: 14, t: 14, b: 26 };
      const t0 = Math.min(new Date(START).getTime(), cum[0].t.getTime());
      const tMax = Math.max(cum[cum.length - 1].t.getTime(), Date.now());
      const yMax = niceMax(Math.max(total, ...cum.map((p) => p.y)) || 1);
      const X = (t) => pad.l + (t - t0) / (tMax - t0 || 1) * (W - pad.l - pad.r);
      const Y = (v) => H - pad.b - v / yMax * (H - pad.t - pad.b);
      const pts = [{ t: new Date(t0), y: 0 }, ...cum];
      const line = pts.map((p, i) => (i ? 'L' : 'M') + X(p.t.getTime()).toFixed(1) + ' ' + Y(p.y).toFixed(1)).join(' ');
      const area = line + ` L ${X(tMax).toFixed(1)} ${Y(0)} L ${X(t0).toFixed(1)} ${Y(0)} Z`;
      const yTicks = [0, .25, .5, .75, 1].map((f) => { const v = Math.round(yMax * f); return `<line class="c-grid" x1="${pad.l}" y1="${Y(v)}" x2="${W - pad.r}" y2="${Y(v)}"/><text class="c-axis" x="${pad.l - 6}" y="${Y(v) + 3}" text-anchor="end">${v}</text>`; }).join('');
      const xTicks = [0, .5, 1].map((f) => { const t = t0 + (tMax - t0) * f; return `<text class="c-axis" x="${X(t)}" y="${H - 8}" text-anchor="middle">${shortDate(t)}</text>`; }).join('');
      const goal = `<line class="c-goal" x1="${pad.l}" y1="${Y(total)}" x2="${W - pad.r}" y2="${Y(total)}"/><text class="c-goal-lab" x="${W - pad.r}" y="${Y(total) - 4}" text-anchor="end">goal ${total}</text>`;
      return `<svg viewBox="0 0 ${W} ${H}"><defs><linearGradient id="cumg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1565c0" stop-opacity=".35"/><stop offset="1" stop-color="#1565c0" stop-opacity="0"/></linearGradient></defs>${yTicks}${goal}<path d="${area}" fill="url(#cumg)"/><path class="c-line" d="${line}"/>${xTicks}</svg>`;
    }

    function barChart(perDay) {
      const days = Object.keys(perDay).filter((d) => perDay[d] > 0).sort();
      if (!days.length) return emptyChart('No daily activity yet');
      const W = 720, H = 200, pad = { l: 30, r: 10, t: 12, b: 30 };
      const max = niceMax(Math.max(...days.map((d) => perDay[d])));
      const bw = (W - pad.l - pad.r) / days.length, gap = Math.min(4, bw * .2);
      const Y = (v) => H - pad.b - v / max * (H - pad.t - pad.b);
      const bars = days.map((d, i) => {
        const x = pad.l + i * bw, h = (H - pad.b) - Y(perDay[d]);
        return `<rect x="${(x + gap / 2).toFixed(1)}" y="${Y(perDay[d]).toFixed(1)}" width="${(bw - gap).toFixed(1)}" height="${Math.max(0, h).toFixed(1)}" rx="3" fill="#1565c0"><title>${d}: ${perDay[d]} eps</title></rect>`;
      }).join('');
      const yTicks = [0, .5, 1].map((f) => { const v = Math.round(max * f); return `<line class="c-grid" x1="${pad.l}" y1="${Y(v)}" x2="${W - pad.r}" y2="${Y(v)}"/><text class="c-axis" x="${pad.l - 5}" y="${Y(v) + 3}" text-anchor="end">${v}</text>`; }).join('');
      const step = Math.ceil(days.length / 8);
      const xTicks = days.map((d, i) => i % step === 0 ? `<text class="c-axis" x="${pad.l + i * bw + bw / 2}" y="${H - 8}" text-anchor="middle">${shortDate(d)}</text>` : '').join('');
      return `<svg viewBox="0 0 ${W} ${H}">${yTicks}${bars}${xTicks}</svg>`;
    }

    function dowChart(perDow) {
      const names = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      if (!perDow.some((v) => v > 0)) return emptyChart('No data yet');
      const W = 360, H = 200, pad = { l: 28, r: 10, t: 12, b: 26 };
      const max = niceMax(Math.max(...perDow));
      const bw = (W - pad.l - pad.r) / 7, gap = 7;
      const Y = (v) => H - pad.b - v / max * (H - pad.t - pad.b);
      const bars = perDow.map((v, i) => {
        const x = pad.l + i * bw;
        return `<rect x="${(x + gap / 2).toFixed(1)}" y="${Y(v).toFixed(1)}" width="${(bw - gap).toFixed(1)}" height="${Math.max(0, (H - pad.b) - Y(v)).toFixed(1)}" rx="3" fill="hsl(${28 + i * 12} 80% 55%)"><title>${names[i]}: ${v} eps</title></rect>` +
          `<text class="c-axis" x="${x + bw / 2}" y="${H - 8}" text-anchor="middle">${names[i]}</text>`;
      }).join('');
      return `<svg viewBox="0 0 ${W} ${H}">${bars}</svg>`;
    }

    function sagaChart() {
      return sagaOrder().map((s) => {
        const arcs = arcsOf(s), w = sumWatched(arcs), t = sumTotal(arcs), p = pct(w, t), hue = hueFor(s);
        return `<div class="saga-bar-row"><span class="saga-bar-name" title="${esc(s)}">${esc(s)}</span>
          <span class="saga-bar-track"><span class="saga-bar-fill" style="width:${p}%;background:linear-gradient(90deg,hsl(${hue} 75% 50%),hsl(${hue} 80% 64%))"></span></span>
          <span class="saga-bar-val">${w}/${t}</span></div>`;
      }).join('');
    }

    function renderStatsPage() {
      const { cum, perDay, perDow } = buildTimeline();
      const watched = sumWatched(S.arcs), total = sumTotal(S.arcs), p = pct(watched, total);
      const start = new Date(START), now = new Date();
      const calDays = Math.max(1, daysBetween(start, now));
      const activeDays = Object.keys(perDay).filter((d) => perDay[d] > 0).length;
      const bestDay = Object.entries(perDay).reduce((m, [d, v]) => v > m.v ? { d, v } : m, { d: null, v: 0 });
      const remaining = total - watched, avg = watched / calDays;
      const projTxt = remaining <= 0 ? 'Done! 🏆'
        : avg > 0 ? fmtDate(new Date(now.getTime() + Math.ceil(remaining / avg) * DAY)) : '—';
      const projSub = remaining <= 0 ? 'King of the Pirates'
        : avg > 0 ? `you'll be ${ageAt(BIRTH, new Date(now.getTime() + Math.ceil(remaining / avg) * DAY))}` : 'log an episode';
      const kpi = (val, lab, sub, hue) => `<div class="kpi" style="--hue:${hue}"><div class="kpi-val">${val}</div><div class="kpi-lab">${lab}</div><div class="kpi-sub">${sub}</div></div>`;
      document.getElementById('kpis').innerHTML =
        kpi(watched, 'Episodes watched', `of ${total} · ${p}%`, 210) +
        kpi(avg.toFixed(2), 'Avg / day', `over ${calDays} days`, 145) +
        kpi(bestDay.v || 0, 'Best day', bestDay.d ? fmtDate(bestDay.d) : '—', 28) +
        kpi(activeDays, 'Active days', `${calDays - activeDays} rest days`, 280) +
        kpi(projTxt, 'Projected finish', projSub, 48);
      document.getElementById('chart-cum').innerHTML = lineChart(cum, total);
      document.getElementById('chart-day').innerHTML = barChart(perDay);
      document.getElementById('chart-dow').innerHTML = dowChart(perDow);
      document.getElementById('chart-saga').innerHTML = sagaChart();
    }

    // ── Mutations ─────────────────────────────────────────────────────────────────
    function findArc(id) { return S.arcs.find((a) => a.id === id); }

    async function setWatched(id, value) {
      const arc = findArc(id);
      if (!arc) return;
      const clamped = Math.max(0, Math.min(arc.epCount, value));
      if (clamped === arc.watchedCount) return;
      const prev = arc.watchedCount;
      const wasComplete = sumWatched(S.arcs) >= sumTotal(S.arcs);
      const arcWasDone = prev >= arc.epCount;
      arc.watchedCount = clamped; // optimistic
      render();
      try {
        const saved = await apiPut(id, { watchedCount: clamped });
        Object.assign(arc, saved);
        try { S.log = await apiGetLog(); } catch {} // keep activity in sync
        // celebrate newly finishing an arc, or the whole series
        const nowComplete = sumWatched(S.arcs) >= sumTotal(S.arcs);
        if (nowComplete && !wasComplete) { confetti({ count: 320, spread: true }); fanfare(); }
        else if (arc.watchedCount >= arc.epCount && !arcWasDone) { confetti({ count: 90 }); ding(); }
      }
      catch { arc.watchedCount = prev; alert('Could not save — check the server.'); }
      render();
    }

    // ── Events ──────────────────────────────────────────────────────────────────────
    document.getElementById('content').addEventListener('click', (e) => {
      const sagaHead = e.target.closest('[data-act="toggle-saga"]');
      if (sagaHead) {
        const saga = sagaHead.closest('.saga').dataset.saga;
        if (S.collapsed.has(saga)) S.collapsed.delete(saga); else S.collapsed.add(saga);
        sagaHead.closest('.saga').classList.toggle('collapsed');
        return;
      }
      const arcEl = e.target.closest('.arc');
      if (!arcEl) return;
      const id = arcEl.dataset.id, arc = findArc(id);
      const act = e.target.closest('[data-act]')?.dataset.act;
      if (act === 'toggle') setWatched(id, arc.watchedCount >= arc.epCount ? 0 : arc.epCount);
      else if (act === 'inc') setWatched(id, arc.watchedCount + 1);
      else if (act === 'dec') setWatched(id, arc.watchedCount - 1);
    });

    document.getElementById('reset-btn').addEventListener('click', async () => {
      if (!confirm('Reset all watch progress to zero?')) return;
      try { S.arcs = await apiReset(); try { S.log = await apiGetLog(); } catch {} render(); }
      catch { alert('Reset failed.'); }
    });

    let allExpanded = true;
    document.getElementById('expand-all').addEventListener('click', (e) => {
      allExpanded = !allExpanded;
      if (allExpanded) S.collapsed.clear();
      else sagaOrder().forEach((s) => S.collapsed.add(s));
      e.currentTarget.textContent = allExpanded ? '⤢ Expand all' : '⤡ Collapse all';
      render();
    });

    // ── Confetti (lightweight canvas burst) ─────────────────────────────────────────
    const cvs = document.getElementById('confetti-canvas');
    const ctx = cvs.getContext('2d');
    const CONF_COLORS = ['#f0b429', '#1565c0', '#e74c3c', '#16a36b', '#ffd76b', '#ffffff'];
    function confetti(opts = {}) {
      const count = opts.count || 120;
      cvs.width = innerWidth; cvs.height = innerHeight; cvs.style.display = 'block';
      const parts = [];
      for (let i = 0; i < count; i++) {
        const fromTop = opts.spread;
        parts.push({
          x: fromTop ? Math.random() * innerWidth : innerWidth / 2 + (Math.random() - .5) * 240,
          y: fromTop ? -20 - Math.random() * innerHeight * .3 : innerHeight * .32,
          vx: (Math.random() - .5) * (fromTop ? 4 : 9),
          vy: fromTop ? Math.random() * 3 + 2 : Math.random() * -9 - 4,
          g: .18 + Math.random() * .14, size: 6 + Math.random() * 7,
          color: CONF_COLORS[Math.random() * CONF_COLORS.length | 0],
          rot: Math.random() * 6.28, vr: (Math.random() - .5) * .35, life: 0,
        });
      }
      let frame = 0;
      (function tick() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        let alive = false;
        for (const p of parts) {
          p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life++;
          if (p.y < cvs.height + 30) alive = true;
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
          ctx.globalAlpha = Math.max(0, 1 - p.life / 220); ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * .62); ctx.restore();
        }
        if (alive && ++frame < 260) requestAnimationFrame(tick);
        else { ctx.clearRect(0, 0, cvs.width, cvs.height); cvs.style.display = 'none'; }
      })();
    }

    // ── Audio: generated sea-shanty + little sound effects (Web Audio) ───────────────
    let actx, master, musicOn = false, loopTimer = null;
    function ensureAudio() {
      if (!actx) {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
      }
      if (actx.state === 'suspended') actx.resume();
    }
    function tone(freq, t, dur, type = 'triangle', vol = .2, dest) {
      if (!freq) return;
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + .02);
      g.gain.exponentialRampToValueAtTime(.0008, t + dur);
      o.connect(g).connect(dest || master); o.start(t); o.stop(t + dur + .05);
    }
    // original cheerful waltz-y shanty (note, beats)
    const N = { D4: 293.66, E4: 329.63, F4: 369.99, G4: 392.0, A4: 440, B4: 493.88, C5: 554.37, D5: 587.33, E5: 659.25, Fs5: 739.99, G5: 783.99, 0: 0 };
    const MELODY = [
      ['D4', 1], ['F4', .5], ['A4', .5], ['D5', 1],
      ['C5', 1], ['A4', 1], ['F4', 1],
      ['G4', 1], ['B4', .5], ['D5', .5], ['G5', 1],
      ['Fs5', 1], ['D5', 1], ['A4', 1],
      ['B4', 1], ['D5', .5], ['B4', .5], ['G4', 1],
      ['A4', 1], ['F4', 1], ['D4', 1],
      ['E4', 1], ['G4', .5], ['B4', .5], ['E5', 1],
      ['D5', 2], [0, 1],
    ];
    const BASS = [146.83, 110, 98, 146.83, 98, 146.83, 110, 146.83]; // one root per bar (3 beats)
    const BEAT = 60 / 116;
    function scheduleLoop(start) {
      let t = start;
      for (const [n, b] of MELODY) { const d = b * BEAT; tone(N[n], t, d * .92, 'triangle', .16); t += d; }
      // bass: 8 bars × 3 beats
      let bt = start;
      for (let bar = 0; bar < BASS.length; bar++) { tone(BASS[bar], bt, BEAT * 3 * .96, 'sine', .22); bt += BEAT * 3; }
      return t;
    }
    function startMusic() {
      ensureAudio();
      master.gain.cancelScheduledValues(actx.currentTime);
      master.gain.linearRampToValueAtTime(.5, actx.currentTime + .6);
      let next = actx.currentTime + .15;
      (function loop() { next = scheduleLoop(next); loopTimer = setTimeout(loop, (next - actx.currentTime - .25) * 1000); })();
    }
    function stopMusic() {
      if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
      if (master) master.gain.linearRampToValueAtTime(0, actx.currentTime + .35);
    }
    document.getElementById('music-btn').addEventListener('click', (e) => {
      musicOn = !musicOn;
      if (musicOn) { startMusic(); e.currentTarget.classList.add('playing'); e.currentTarget.textContent = '🎶 Playing'; }
      else { stopMusic(); e.currentTarget.classList.remove('playing'); e.currentTarget.textContent = '🎵 Shanty'; }
    });
    // short SFX (work even when music is off)
    function sfx(seq, type = 'square', vol = .18) {
      ensureAudio();
      const tmp = actx.createGain(); tmp.gain.value = 1; tmp.connect(actx.destination);
      let t = actx.currentTime + .01;
      for (const [f, d] of seq) { tone(f, t, d, type, vol, tmp); t += d; }
    }
    function ding() { sfx([[523.25, .1], [659.25, .1], [783.99, .18]], 'triangle', .2); }
    function fanfare() { sfx([[523.25, .14], [659.25, .14], [783.99, .14], [1046.5, .3]], 'sawtooth', .16); }

    // ── Boot ──────────────────────────────────────────────────────────────────────
    (async () => {
      try {
        const [arcs, log] = await Promise.all([apiGet(), apiGetLog().catch(() => [])]);
        S.arcs = arcs; S.log = log; render();
        if (location.hash === '#stats') switchView('stats');
      }
      catch { document.getElementById('content').innerHTML = '<div class="errbox">🌊 Failed to load tracker data. Check the server and try again.</div>'; }
    })();
  </script>
</body>
</html>
